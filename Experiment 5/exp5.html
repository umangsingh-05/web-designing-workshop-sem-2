<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employees Management Box</title>
    <link rel = "stylesheet" href = "exp5.css">
</head>
<body>
    <div class= "container">
        <h2><u>Employee Salary Management System</u></h2>

        <input type="text" id="name" placeholder="Employee Name"><br><br>
        <input type="text" id="empId" placeholder="Employee ID"><br><br>
        <input type="number" id="salary" placeholder="Salary"><br><br>
        <input type="text" id="dept" placeholder="Department"><br><br>

        <button onclick="addEmployee()">Add Employee</button><br><br>
        <button onclick="displayEmployee()">Display All</button>
        <button onclick="filterSalary()">Salary > 50000</button>
        <button onclick="totalSalary()">Total Salary</button>
        <button onclick="averageSalary()">Average Salary</button><br><br>
        <button onclick="countDepartment()">Count by Department</button>
        <div id="output"></div>
    </div>
    <script src="exp5.js"></script>
</body>
</html>
